name: mixpad
description: MixPad Music App Dive into a musical journey with pads that play unique sounds. Crafted by Sagnik Bhattacharya with Flutter

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.1.3 <4.0.0'


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  audioplayers: ^6.6.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^2.0.0

dependency_overrides:
  path_provider: ^2.1.5
  path_provider_android: ^2.2.17
  path_provider_windows: ^2.3.0
  win32: ^6.0.0


flutter:


  uses-material-design: true

  assets:
    - assets/
